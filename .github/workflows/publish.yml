name: build-and-publish

on:
  push:
    branches:
      - main
      - "project/**"
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Backend smoke tests ─────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Smoke test — validators catch duplicate env keys
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from backend.validators import _scan_duplicate_env_keys
          compose = '''services:
            traefik:
              environment:
                CF_DNS_API_TOKEN: abc
                CF_DNS_API_TOKEN:
          '''
          issues = _scan_duplicate_env_keys(compose)
          assert len(issues) == 1, f'Expected 1 issue, got {len(issues)}'
          assert 'CF_DNS_API_TOKEN' in issues[0].message
          print('OK: duplicate env key detection works')
          "

      - name: Smoke test — generator produces valid compose
        run: |
          python -c "
          import sys, tempfile; sys.path.insert(0, '.')
          from pathlib import Path
          from backend.models import StackRequest, ServiceChoice
          from backend.generator import generate
          from backend.validators import validate_compose_file
          req = StackRequest(
              domain='example.com',
              services=[
                  ServiceChoice(key='sonarr'),
                  ServiceChoice(key='radarr'),
                  ServiceChoice(key='prowlarr'),
                  ServiceChoice(key='traefik'),
              ],
          )
          text = generate(req)
          with tempfile.NamedTemporaryFile(mode='w', suffix='.yml', delete=False) as f:
              f.write(text)
              path = Path(f.name)
          issues = validate_compose_file(path)
          errors = [i for i in issues if i.severity == 'error']
          assert len(errors) == 0, f'Generator produced invalid compose: {errors}'
          print('OK: generator output validates clean')
          "

      - name: Smoke test — main.py imports and route ordering check passes
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from backend import main
          from fastapi.routing import APIRoute
          api_routes = [r for r in main.app.router.routes if isinstance(r, APIRoute)]
          assert api_routes[-1].path == '/{full_path:path}', \
              f'SPA not last: {api_routes[-1].path}'
          print('OK: SPA catch-all is last')
          "

  # ── Automated semantic version bump ─────────────────────────────────────────
  version-bump:
    runs-on: ubuntu-latest
    needs: [test-backend]
    # Only bump on direct pushes to main, not on PRs or tag pushes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.bump.outputs.sha }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so git describe finds tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump version if warranted
        id: bump
        run: |
          result=$(python scripts/bump_version.py)
          echo "$result"
          VERSION="${result#BUMPED=}"
          if [ -z "$VERSION" ]; then
            echo "No bumpable commits since last tag — skipping"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add backend/__init__.py frontend/package.json CHANGELOG.md
            git commit -m "chore: bump version to ${VERSION} [skip ci]"
            git tag "$VERSION"
            git push origin main "$VERSION"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

  # ── Build frontend natively (fast, no QEMU) ─────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── Build and push Docker image (multi-arch, no Node.js under QEMU) ─────────
  build:
    needs: [version-bump, build-frontend]
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.build-frontend.result == 'success' &&
      (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    permissions:
      contents: read
      packages: write

    steps:
      # Check out the version-bump commit if one was made, otherwise the
      # original SHA (covers PRs and tag-triggered runs where bump is skipped)
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.sha || github.sha }}

      - name: Download pre-built frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
