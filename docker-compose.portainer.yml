# MediaStack-RAD v2 — Portainer Stack
#
# HOW TO DEPLOY IN PORTAINER:
#   Stacks → Add stack → Web editor
#   Paste this file, edit the environment variables below, click Deploy.
#
# No .env file needed — all variables are defined inline with their defaults.
# Change any value directly in the editor before deploying.

services:
  mediastack-rad:
    image: ghcr.io/nnyan/mediastack-rad-v2:latest
    container_name: mediastack-rad
    restart: unless-stopped

    ports:
      - "8090:8090"        # Change left number to use a different host port

    volumes:
      # Docker socket — write access needed for Traefik auto-apply.
      # Change to /var/run/docker.sock:/var/run/docker.sock:ro for read-only.
      - /var/run/docker.sock:/var/run/docker.sock

      # Host path to your media stack compose folder.
      # CHANGE THIS to the folder containing your docker-compose.yml.
      - /opt/mediastack:/compose

    environment:
      - PYTHONUNBUFFERED=1
      # Path to the compose file inside the container (after the mount above).
      # Only change if your file is named something other than docker-compose.yml.
      - COMPOSE_FILE_PATH=/compose/docker-compose.yml

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8090/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    labels:
      # ── Traefik ─────────────────────────────────────────────────────────
      # Change traefik.enable to "true" and set your hostname to enable routing.
      - "traefik.enable=false"
      - "traefik.http.routers.mediastack-rad.rule=Host(`rad.yourdomain.com`)"
      - "traefik.http.routers.mediastack-rad.entrypoints=websecure"
      - "traefik.http.routers.mediastack-rad.tls.certresolver=letsencrypt"
      - "traefik.http.services.mediastack-rad.loadbalancer.server.port=8090"

networks:
  default:
    # If your media stack containers are on an existing Docker network,
    # set name to that network and external to true.
    # Example: name: mediastack / external: true
    name: mediastack-rad
    external: false
