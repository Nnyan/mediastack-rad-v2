services:
  mediastack-rad:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mediastack-rad
    restart: unless-stopped
    ports:
      - "${PORT:-8090}:8090"
    volumes:
      # Docker socket — write access required for the "Apply & recreate" feature.
      # If you only need read-only monitoring, change back to :ro
      - /var/run/docker.sock:/var/run/docker.sock

      # Mount your stack's compose directory so the app can patch labels and
      # run `docker compose up`. Set COMPOSE_DIR to the folder containing your
      # docker-compose.yml (the one that manages your media stack).
      - ${COMPOSE_DIR:-/opt/mediastack}:/compose

    environment:
      - PYTHONUNBUFFERED=1
      # Path to your compose file inside the container (after the mount above)
      - COMPOSE_FILE_PATH=${COMPOSE_FILE_PATH:-/compose/docker-compose.yml}

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8090/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.http.routers.mediastack-rad.rule=Host(`${TRAEFIK_HOST:-mediastack-rad.localhost}`)"
      - "traefik.http.routers.mediastack-rad.entrypoints=websecure"
      - "traefik.http.routers.mediastack-rad.tls.certresolver=letsencrypt"
      - "traefik.http.services.mediastack-rad.loadbalancer.server.port=8090"

networks:
  default:
    name: ${DOCKER_NETWORK:-mediastack-rad}
    external: ${NETWORK_EXTERNAL:-false}
