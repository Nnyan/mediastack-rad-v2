# docker-compose.yml — for CLI, Portainer, or Dockhand
# Pull the pre-built image: ghcr.io/nnyan/mediastack-rad-v2:latest
# No build step required.

services:
  mediastack-rad:
    image: ghcr.io/nnyan/mediastack-rad-v2:latest

    # ── To build from source instead ────────────────────────────────────────
    # Comment the image: line above and uncomment these two lines:
    # build:
    #   context: .

    container_name: mediastack-rad
    restart: unless-stopped

    ports:
      - "${PORT:-8090}:8090"

    volumes:
      # Docker socket — required for container monitoring and control.
      # Write access (no :ro) is needed for the Traefik auto-apply feature.
      # Change to :ro if you only need read-only monitoring.
      - /var/run/docker.sock:/var/run/docker.sock

      # Your media stack compose folder, mounted at /compose inside the container.
      # The Traefik page can read, patch, and recreate services using this file.
      # Set COMPOSE_DIR to the host path containing your docker-compose.yml.
      - ${COMPOSE_DIR:-/opt/mediastack}:/compose

    environment:
      - PYTHONUNBUFFERED=1
      - COMPOSE_FILE_PATH=${COMPOSE_FILE_PATH:-/compose/docker-compose.yml}

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8090/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    labels:
      # ── Traefik (optional) ───────────────────────────────────────────────
      # Set TRAEFIK_ENABLE=true and TRAEFIK_HOST to your domain to route this
      # container through Traefik with a TLS certificate.
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.http.routers.mediastack-rad.rule=Host(`${TRAEFIK_HOST:-mediastack-rad.localhost}`)"
      - "traefik.http.routers.mediastack-rad.entrypoints=websecure"
      - "traefik.http.routers.mediastack-rad.tls.certresolver=letsencrypt"
      - "traefik.http.services.mediastack-rad.loadbalancer.server.port=8090"

      # ── Dockhand / Watchtower (optional) ────────────────────────────────
      # Uncomment to let Dockhand or Watchtower auto-update this container.
      # - "com.centurylinklabs.watchtower.enable=true"

networks:
  default:
    name: ${DOCKER_NETWORK:-mediastack-rad}
    external: ${NETWORK_EXTERNAL:-false}
